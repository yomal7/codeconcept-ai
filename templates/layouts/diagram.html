{% extends "base.html" %}
{% from "components.html" import bullet_list, section_title with context %}
{% block content %}
<div class="layout layout--diagram">
    {{ section_title(slide.title, slide.subtitle) }}
    <div class="diagram">{{ diagram_svg|safe }}</div>
    {{ bullet_list(slide.bullets, "bullets--compact") }}
</div>
{% endblock %}
